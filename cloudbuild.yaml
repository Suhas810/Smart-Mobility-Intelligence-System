steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/safe-route-ai:latest'
      - '-t'
      - 'gcr.io/$PROJECT_ID/safe-route-ai:$COMMIT_SHA'
      - '.'

  # Push the image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/safe-route-ai'

  # Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/run'
    args:
      - 'deploy'
      - 'safe-route-ai'
      - '--image'
      - 'gcr.io/$PROJECT_ID/safe-route-ai:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'NODE_ENV=production'

images:
  - 'gcr.io/$PROJECT_ID/safe-route-ai:latest'
  - 'gcr.io/$PROJECT_ID/safe-route-ai:$COMMIT_SHA'
